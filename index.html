<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi My Love ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff6ec4,#7873f5,#f7971e,#ffd200);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
overflow:hidden;
padding:20px;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.card{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);
padding:30px;
border-radius:25px;
text-align:center;
max-width:420px;
width:100%;
color:white;
box-shadow:0 15px 50px rgba(0,0,0,0.3);
position:relative;
z-index:2;
}

.card img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
margin-bottom:15px;
}

h1{
font-size:2rem;
margin-bottom:10px;
min-height:50px;
}
p{
    font-size:1rem;
    margin-bottom:20px;
}

button{
padding:12px 25px;
border:none;
border-radius:30px;
background:white;
color:#ff4081;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff4081;
color:white;
}

.letter{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:30px;
display:none;
z-index:5;
animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

.color{
position:fixed;
width:20px;
height:20px;
border-radius:50%;
animation:blast 2s linear forwards;
}

@keyframes blast{
from{transform:translate(0,0);opacity:1;}
to{transform:translate(var(--x),var(--y));opacity:0;}
}

@media(max-width:480px){
h1{font-size:1.5rem;}
}
</style>
</head>

<body>

<div class="card">
<img src="r.jpeg" alt="Her Photo">
<h1 id="typing"></h1>
<button onclick="startSurprise()">Open Your Surprise 🎁</button>
</div>

<div class="letter" id="loveLetter">
<div>
<h2>Happy Holi My Love 🌈❤️</h2>
    <p>You are the most beautiful color of my life 💕</p>
<p style="margin-top:20px;">
This Holi I just want to color your life with happiness,
love and endless smiles 😘💖 <br><br>
You are the most beautiful part of my world.
I Love You Forever ❤️
</p>
</div>
</div>

<audio id="bgMusic" preload="auto">
<source src="love.mp3" type="audio/mpeg">
</audio>

<script>

const music = document.getElementById("bgMusic");
const nameText = "Happy Holi Riya ❤️";  // 👈 Yaha uska naam likh dena
let i = 0;

// Typing Animation
function typeEffect(){
if(i < nameText.length){
document.getElementById("typing").innerHTML += nameText.charAt(i);
i++;
setTimeout(typeEffect,80);
}
}
typeEffect();

// Autoplay Try
window.addEventListener("load", function(){
music.play().catch(()=>{});
});

// Backup click start
document.addEventListener("click", function(){
music.play().catch(()=>{});
}, { once:true });

function startSurprise(){

music.play().catch(()=>{});

document.getElementById("loveLetter").style.display="flex";

// Gulal Blast
for(let i=0;i<120;i++){
let color=document.createElement("div");
color.classList.add("color");
document.body.appendChild(color);

color.style.background=`hsl(${Math.random()*360},100%,50%)`;
color.style.left=window.innerWidth/2+"px";
color.style.top=window.innerHeight/2+"px";
color.style.setProperty('--x',(Math.random()*800-400)+"px");
color.style.setProperty('--y',(Math.random()*800-400)+"px");

setTimeout(()=>{color.remove();},2000);
}

}

</script>

</body>
</html>
