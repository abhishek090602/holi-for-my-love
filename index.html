<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi My Love ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#ff6ec4,#7873f5,#f7971e,#ffd200);
    background-size:400% 400%;
    animation:bgMove 10s infinite alternate;
    padding:20px;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    100%{background-position:100% 50%}
}

.card{
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    padding:30px;
    border-radius:25px;
    text-align:center;
    max-width:400px;
    width:100%;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.card img{
    width:150px;
    height:150px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid white;
    margin-bottom:15px;
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

p{
    font-size:1rem;
    margin-bottom:20px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4081;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
    background:#ff4081;
    color:white;
}

.message{
    margin-top:20px;
    display:none;
    font-size:1.1rem;
    animation:fadeIn 2s ease forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* Floating colors */
.color{
    position:fixed;
    width:15px;
    height:15px;
    border-radius:50%;
    animation:float 5s linear infinite;
    opacity:0.7;
}

@keyframes float{
    from{
        transform:translateY(100vh) scale(0.5);
    }
    to{
        transform:translateY(-10vh) scale(1);
    }
}

/* Responsive */
@media(max-width:480px){
    .card{
        padding:20px;
    }
    h1{
        font-size:1.5rem;
    }
}
</style>
</head>

<body>

<div class="card">
    <!-- 👇 Replace this image with her photo -->
    <img src="r.jpeg" alt="Her Photo">

    <h1>Happy Holi My Love 🌈❤️</h1>
    <p>You are the most beautiful color of my life 💕</p>

    <button onclick="showLove()">Tap for Surprise 🎁</button>

    <div class="message" id="loveMessage">
        This Holi I promise to fill your life with  
        happiness, laughter & endless love 😘💖  
        <br><br>
        I Love You Forever ❤️
    </div>
</div>

<script>
function showLove(){
    document.getElementById("loveMessage").style.display="block";

    for(let i=0;i<50;i++){
        let color=document.createElement("div");
        color.classList.add("color");
        document.body.appendChild(color);

        color.style.left=Math.random()*100+"vw";
        color.style.background=`hsl(${Math.random()*360},100%,50%)`;
        color.style.animationDuration=(3+Math.random()*5)+"s";

        setTimeout(()=>{color.remove();},5000);
    }
}
</script>

</body>

</html>
