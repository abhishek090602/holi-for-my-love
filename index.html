<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Holi Surprise ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(-45deg,#ff6ec4,#7873f5,#f7971e,#ffd200);
background-size:400% 400%;
animation:bgMove 8s infinite alternate;
color:white;
text-align:center;
padding:20px;
overflow:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
max-width:420px;
width:100%;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
}

.profile-pic{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:5px solid white;
margin-bottom:15px;
}

input{
padding:10px;
width:100%;
border:none;
border-radius:20px;
margin-top:15px;
text-align:center;
}

button{
padding:10px 20px;
margin-top:15px;
border:none;
border-radius:25px;
background:white;
color:#ff4081;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
background:#ff4081;
color:white;
}

.hidden{
display:none;
}

.color{
position:fixed;
width:15px;
height:15px;
border-radius:50%;
animation:blast 2s linear forwards;
}

@keyframes blast{
from{transform:translate(0,0);opacity:1;}
to{transform:translate(var(--x),var(--y));opacity:0;}
}
</style>
</head>

<body>

<!-- PASSWORD BOX -->
<div class="container" id="loginBox">
<h2>Enter Password ❤️</h2>
<input type="password" id="passwordInput" placeholder="Enter password">
<button onclick="checkPassword()">Open</button>
<p id="error" style="margin-top:10px;color:#ffdada;"></p>
</div>

<!-- MAIN CONTENT -->
<div class="container hidden" id="mainContent">

<img src="r.jpeg" alt="Her Photo" class="profile-pic">

<h1>Happy Holi My Love 🌈❤️</h1>
<p>You are the most beautiful color of my life 💕</p>

<button onclick="startSurprise()">Tap for Surprise 🎁</button>

<div id="loveMessage" style="display:none;margin-top:20px;">
<p>
I’m going to miss you so much this Holi 💕<br>
But my love will always reach you no matter what ❤️<br><br>
Love you forever 😘
</p>
</div>

</div>

<!-- MUSIC -->
<audio id="bgMusic">
<source src="love.mp3" type="audio/mpeg">
</audio>

<script>

const correctPassword = "riya123";  // 👈 Yaha password change karo
const music = document.getElementById("bgMusic");

function checkPassword(){
let input = document.getElementById("passwordInput").value;
if(input === correctPassword){
document.getElementById("loginBox").classList.add("hidden");
document.getElementById("mainContent").classList.remove("hidden");
}else{
document.getElementById("error").innerText="Wrong Password ❤️";
}
}

function startSurprise(){

music.play().catch(()=>{});

document.getElementById("loveMessage").style.display="block";

for(let i=0;i<70;i++){
let color=document.createElement("div");
color.classList.add("color");
document.body.appendChild(color);

color.style.background=`hsl(${Math.random()*360},100%,50%)`;
color.style.left=window.innerWidth/2+"px";
color.style.top=window.innerHeight/2+"px";
color.style.setProperty('--x',(Math.random()*600-300)+"px");
color.style.setProperty('--y',(Math.random()*600-300)+"px");

setTimeout(()=>{color.remove();},2000);
}
}

</script>

</body>
</html>
